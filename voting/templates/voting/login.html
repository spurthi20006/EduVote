{% extends 'voting/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - {{ institution_display }} | EduVote{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="glass-panel p-5 mt-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-1">{{ institution_display }}</h2>
                <p class="text-muted">Enter your details to cast your vote</p>
            </div>

            <form method="post" autocomplete="off">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-gradient py-2">
                        Verify & Login <i class="fa-solid fa-arrow-right ms-1"></i>
                    </button>
                </div>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'home' %}" class="text-decoration-none text-muted" style="font-size: 0.9rem;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Selection
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
